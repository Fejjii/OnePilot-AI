services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: onepilot
      POSTGRES_PASSWORD: onepilot
      POSTGRES_DB: onepilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # ── Application ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://onepilot:onepilot@postgres:5432/onepilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEV_ORG_ID: org_demo_onepilot
      DEV_USER_ID: usr_demo_admin
      # Explicit passthrough from project-root .env (compose variable substitution)
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPER_BASE_URL: ${SERPER_BASE_URL:-https://google.serper.dev/search}
      SERPER_TIMEOUT_SECONDS: ${SERPER_TIMEOUT_SECONDS:-10}
      SERPER_MAX_RESULTS: ${SERPER_MAX_RESULTS:-5}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://127.0.0.1:8765/}
      GMAIL_PROVIDER_MODE: ${GMAIL_PROVIDER_MODE:-auto}
      GMAIL_SEND_ENABLED: ${GMAIL_SEND_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CALENDAR_PROVIDER_MODE: ${GOOGLE_CALENDAR_PROVIDER_MODE:-auto}
      GOOGLE_CALENDAR_CREATE_ENABLED: ${GOOGLE_CALENDAR_CREATE_ENABLED:-true}
      GOOGLE_CALENDAR_DEFAULT_TIMEZONE: ${GOOGLE_CALENDAR_DEFAULT_TIMEZONE:-Europe/Berlin}
      GOOGLE_CALENDAR_LOOKAHEAD_DAYS: ${GOOGLE_CALENDAR_LOOKAHEAD_DAYS:-14}
      GOOGLE_CALENDAR_SLOT_DURATION_MINUTES: ${GOOGLE_CALENDAR_SLOT_DURATION_MINUTES:-30}
      GOOGLE_CALENDAR_WORKDAY_START: ${GOOGLE_CALENDAR_WORKDAY_START:-09:00}
      GOOGLE_CALENDAR_WORKDAY_END: ${GOOGLE_CALENDAR_WORKDAY_END:-17:00}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://onepilot:onepilot@postgres:5432/onepilot
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPER_BASE_URL: ${SERPER_BASE_URL:-https://google.serper.dev/search}
      SERPER_TIMEOUT_SECONDS: ${SERPER_TIMEOUT_SECONDS:-10}
      SERPER_MAX_RESULTS: ${SERPER_MAX_RESULTS:-5}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://127.0.0.1:8765/}
      GMAIL_PROVIDER_MODE: ${GMAIL_PROVIDER_MODE:-auto}
      GMAIL_SEND_ENABLED: ${GMAIL_SEND_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CALENDAR_PROVIDER_MODE: ${GOOGLE_CALENDAR_PROVIDER_MODE:-auto}
      GOOGLE_CALENDAR_CREATE_ENABLED: ${GOOGLE_CALENDAR_CREATE_ENABLED:-true}
      GOOGLE_CALENDAR_DEFAULT_TIMEZONE: ${GOOGLE_CALENDAR_DEFAULT_TIMEZONE:-Europe/Berlin}
      GOOGLE_CALENDAR_LOOKAHEAD_DAYS: ${GOOGLE_CALENDAR_LOOKAHEAD_DAYS:-14}
      GOOGLE_CALENDAR_SLOT_DURATION_MINUTES: ${GOOGLE_CALENDAR_SLOT_DURATION_MINUTES:-30}
      GOOGLE_CALENDAR_WORKDAY_START: ${GOOGLE_CALENDAR_WORKDAY_START:-09:00}
      GOOGLE_CALENDAR_WORKDAY_END: ${GOOGLE_CALENDAR_WORKDAY_END:-17:00}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate
    volumes:
      - ./backend/alembic:/app/alembic

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://onepilot:onepilot@postgres:5432/onepilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      BACKEND_URL: http://backend:8000
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPER_BASE_URL: ${SERPER_BASE_URL:-https://google.serper.dev/search}
      SERPER_TIMEOUT_SECONDS: ${SERPER_TIMEOUT_SECONDS:-10}
      SERPER_MAX_RESULTS: ${SERPER_MAX_RESULTS:-5}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://127.0.0.1:8765/}
      GMAIL_PROVIDER_MODE: ${GMAIL_PROVIDER_MODE:-auto}
      GMAIL_SEND_ENABLED: ${GMAIL_SEND_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CALENDAR_PROVIDER_MODE: ${GOOGLE_CALENDAR_PROVIDER_MODE:-auto}
      GOOGLE_CALENDAR_CREATE_ENABLED: ${GOOGLE_CALENDAR_CREATE_ENABLED:-true}
      GOOGLE_CALENDAR_DEFAULT_TIMEZONE: ${GOOGLE_CALENDAR_DEFAULT_TIMEZONE:-Europe/Berlin}
      GOOGLE_CALENDAR_LOOKAHEAD_DAYS: ${GOOGLE_CALENDAR_LOOKAHEAD_DAYS:-14}
      GOOGLE_CALENDAR_SLOT_DURATION_MINUTES: ${GOOGLE_CALENDAR_SLOT_DURATION_MINUTES:-30}
      GOOGLE_CALENDAR_WORKDAY_START: ${GOOGLE_CALENDAR_WORKDAY_START:-09:00}
      GOOGLE_CALENDAR_WORKDAY_END: ${GOOGLE_CALENDAR_WORKDAY_END:-17:00}
    command: ["python", "scripts/seed_demo.py"]
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - seed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  qdrantdata:
