name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite://
      JWT_SECRET: test-secret-key-for-testing-only
      DEV_AUTH_ENABLED: "false"
      DEV_BYPASS_QUOTAS: "false"
      QDRANT_URL: ""
      OPENAI_API_KEY: ""
      SERPER_API_KEY: ""
      REDIS_URL: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REFRESH_TOKEN: ""
      GMAIL_PROVIDER_MODE: auto
      GOOGLE_CALENDAR_PROVIDER_MODE: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest -q

      - name: Run security-related tests
        run: >
          pytest -q
          tests/test_security_basics.py
          tests/test_auth.py
          tests/test_rate_limit_redis.py
          tests/test_config.py
          tests/test_chat_endpoint.py

      - name: Run evaluation suite
        run: python -m onepilot.evaluation.run_all_evals
        env:
          PYTHONPATH: src

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run frontend tests
        run: pnpm test

      - name: Production build
        run: pnpm build

  # Optional future job: full Docker stack + smoke test.
  # Not enabled by default — Docker in CI is slower and more fragile.
  # See docs/deployment_checklist.md for the local Docker smoke test flow.
